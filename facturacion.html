<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Facturacion </title>
</head>
<body>

<header>
    <h1>Facturacion -  Hospital Ciencia y Compasion</h1>
    <img width="250" align="center" src="logoh.png";>
    <p> Rellene los datos solicitados </p>

<main>
    <div class="form-container">
        <form action="altas.html" method="POST">
            <div class="form-group">
                <label>Folio </label>
                <input type="text" name="folio" placeholder="Ej: F-111 " required>
            </div>
           
            <div class="form-group">
                <label>Tipo de servicio </label>
                <input type="text" name="tipo_ser" placeholder="Ej: consulta general " required>
            </div>
           
            <div class="form-group">
                <label>Nombre del cliente/label>
                <input type="text" name="cliente" placeholder="Ej: Juan perez" required>
            </div>
           
            <div class="form-group">
                <label>Tipo de pago</label>
                <input type="text" name="tipo_pa" placeholder="Ej: seguro medico" required>
            </div>

            <div class="form-group">
                <label>Aseguradora</label>
                <input type="text" name="aseguradora" placeholder="Ej: Pemex" required>
            </div>

            <div class="form-group">
                <label>Total</label>
                <input type="number" name="total" required>
            </div>
  

            <button type="submit" class="btn-submit">Buscar facturas</button>
        </form>
    </div>

    <a href="index.html" class="btn-back"> Volver al Inicio</a>
</main>

<footer>
    <p style=" color: #F5EFEB"; >Carreon Cuevas Megan Naomi - Programación</p>
    <p style=" color: #F5EFEB"; >243080512805255 - 4-I</p>
</footer>

</body>
<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: "Poppins", sans-serif;
        background-color: : : : #567C8d;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    header {
        background-color: #B2C4D7;
        width: 100%;
        padding: 20px 0;
        text-align: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    h1 {
        color: #F5EFEB;
        font-family: 'Jua', sans-serif;
        margin: 0;
        font-size: 2rem;
    }

    main {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        padding: 40px 20px;
        flex: 1;
    }

    .form-container {
        max-width: 500px;
        width: 100%;
        background: white;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(147, 205, 219);
        border-top: 6px solid #C9E6ED;
    }

    .form-group {
        margin-bottom: 22px;
    }
   
    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #555;
        font-size: 14px;
    }
   
    input[type="text"], input[type="number"], input[type="date"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #B2C4D7;
        border-radius: 6px;
        font-family: "Poppins", sans-serif;
        font-size: 14px;
        background-color: #F5EFEB;
        color: #333;
        transition: all 0.3s ease;
    }

    input:focus {
        outline: none;
        border-color: #ca9ec3;
        background-color: #fff;
        box-shadow: 0 0 5px rgba(127, 169, 173);
    }

    .btn-submit {
        background-color: #A7D6E2;
        color: white;
        border: none;
        padding: 14px 15px;
        width: 100%;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s ease;
        font-family: "Poppins", sans-serif;
        margin-top: 10px;
    }

    .btn-submit:hover {
        background-color:#b382ab ;
    }

    .btn-back {
        display: inline-block;
        text-align: center;
        margin-top: 25px;
        color: #888;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: color 0.3s ease;
    }

    .btn-back:hover {
        color: #B2D4D7;
    }

    footer {
        width: 100%;
        background-color: #567C8d;
        padding: 15px 0;
        text-align: center;
        font-size: 13px;
        color: #776a78;
    }

    footer p {
        margin: 4px 0;
        font-family: 'Poppins', sans-serif;
    }
</style>
</html>
